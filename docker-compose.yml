services:

  # ── DNS Layer – AdGuard Home ──────────────────────────────────────────
  dns-server:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:80"      # AdGuard web dashboard
      - "3000:3000"    # AdGuard initial setup wizard
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    networks:
      - internal

  # ── Control Layer – Xbox Orchestrator ─────────────────────────────────
  orchestrator:
    build: ./src
    container_name: traffic-orchestrator
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - internal
    depends_on:
      - dns-server

networks:
  internal:
    driver: bridge

volumes:
  adguard-work:
  adguard-conf:
